suite: pod disruption budget
templates:
  - 080-PodDisruptionBudget.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with minAvailable when enabled
    set:
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: policy/v1
      - equal:
          path: kind
          value: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
