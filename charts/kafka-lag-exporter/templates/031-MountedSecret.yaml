{{- if .Values.secrets -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "kafka-lag-exporter.labels" . | nindent 4 }}
  {{- if .Values.secretAnnotations }}
  annotations:
{{ tpl (toYaml .Values.secretAnnotations) . | indent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- range .Values.secrets.data }}
  {{ .name }}: {{ .value }}
  {{- end }}
{{- end }}
