version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  settings:
    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - nilValReturn
        - truncateCmp
        - unnecessaryDefer
        - weakCond

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
